name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  lint-go:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.21'
      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: go

  test-go:
    name: Go unit tests (${{ matrix.os }})
    needs: lint-go
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.21'
      - name: Run unit tests
        working-directory: go
        run: go test ./... -v

  smoke-test-go:
    name: Go binary smoke test (${{ matrix.os }})
    needs: test-go
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.21'
      - name: Build binary
        working-directory: go
        shell: bash
        run: |
          EXT=""
          if [ "$RUNNER_OS" = "Windows" ]; then EXT=".exe"; fi
          go build -o jira-update${EXT} .
      - name: Verify binary runs
        working-directory: go
        shell: bash
        run: |
          EXT=""
          if [ "$RUNNER_OS" = "Windows" ]; then EXT=".exe"; fi
          ./jira-update${EXT} --version

  lint-python:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        working-directory: python
        run: ruff check .

  test-python:
    name: Python ${{ matrix.python-version }} unit tests
    needs: lint-python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        working-directory: python
        run: pip install -r requirements.txt
      - name: Run unit tests
        working-directory: python
        run: python -m unittest test_parse_since_arg -v

  install-test-python:
    name: Python ${{ matrix.python-version }} install test
    needs: test-python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package into test venv
        run: |
          python -m venv .test-venv
          .test-venv/bin/pip install ./python
      - name: Verify install
        run: .test-venv/bin/jira-update --version
