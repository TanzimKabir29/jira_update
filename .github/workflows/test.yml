name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run tests
        working-directory: go
        run: go test ./... -v

  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: python
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: python
        run: python -m unittest test_parse_since_arg -v
